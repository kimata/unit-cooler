image: gitlab.green-rabbit.net:5050/kimata/local-ubuntu:260104_3efe597c

variables:
    UV_LINK_MODE: copy
    UV_CACHE_DIR: .uv-cache
    PYRIGHT_PYTHON_FORCE_VERSION: latest
    UV_HTTP_TIMEOUT: "120"

    UV_EXTRA_INDEX_URL: "http://proxy:3141/simple/"
    UV_INSECURE_HOST: "proxy"

default:
    before_script:
        - echo $CI_REGISTRY_PASSWORD | docker login -u $CI_REGISTRY_USER --password-stdin $CI_REGISTRY

stages:
    - generate-tag
    - build
    - test
    - tag-latest
    - deploy
    - renovate

generate-tag:
    stage: generate-tag
    script:
        # NOTE: config リポジトリの変更で同一コミットが再ビルドされても一意なタグにする
        # (タグが同じだと kubectl set image がノーオペになり設定が反映されない)
        - echo "TAG=$(date +%y%m%d_%H%M%S)_${CI_COMMIT_SHORT_SHA}" > tag.env
    artifacts:
        reports:
            dotenv: tag.env
        expire_in: 1 hour

build-react:
    stage: build

    needs: []

    image: node:24.18@sha256:5711a0d445a1af54af9589066c646df387d1831a608226f4cd694fc59e745059

    before_script: []

    script:
        - cd frontend
        - npm ci --cache .npm --prefer-offline --no-audit --no-fund
        - npm run build
    artifacts:
        paths:
            - frontend/dist/
    cache:
        - key:
              files:
                  - frontend/package-lock.json
          fallback_keys:
              - npm-cache-${CI_PROJECT_ID}
          paths:
              - .npm/

build-image:
    stage: build

    needs:
        - generate-tag
        - build-react

    variables:
        BUILDER: builder-${CI_PROJECT_NAME}

    script:
        - 'echo "Building: ${CI_REGISTRY_IMAGE}:${TAG}"'

        - git clone https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.green-rabbit.net/kimata/hems-config.git
        - mv hems-config/unit-cooler.yaml config.yaml

        - docker buildx create --driver docker-container --name ${BUILDER} --use --config /etc/buildkitd.toml
        - docker buildx use ${BUILDER}
        - docker buildx inspect --bootstrap
        - >
            docker buildx build
            --provenance=false
            --progress=plain
            --platform linux/amd64,linux/arm64/v8
            --cache-from type=registry,ref=${CI_REGISTRY_IMAGE}:cache
            --cache-from type=registry,ref=${CI_REGISTRY_IMAGE}:latest
            --cache-to type=inline
            --cache-to type=registry,ref=${CI_REGISTRY_IMAGE}:cache,mode=max
            --build-arg IMAGE_BUILD_DATE=$(date --iso-8601=seconds)
            --tag ${CI_REGISTRY_IMAGE}:${TAG}
            --push .

test-typecheck:
    stage: test

    needs: []

    before_script:
        - uv sync --locked --no-editable

    script:
        - uv run python -m pyright
        - uv run mypy src/
        - uv run ty check src/

    cache:
        - key:
              files:
                  - uv.lock
          fallback_keys:
              - uv-cache-${CI_PROJECT_ID}
          paths:
              - ${UV_CACHE_DIR}
              - .mypy_cache/

test-pytest:
    stage: test

    needs: []

    before_script:
        - uv sync --locked --no-editable

    script:
        - uv run pytest tests/unit/ tests/integration/ --junit-xml=reports/junit-report.xml --maxfail=1 --dist=loadgroup

    coverage: '/TOTAL.*\s+(\d+%)/'

    cache:
        - key:
              files:
                  - uv.lock
          fallback_keys:
              - uv-cache-${CI_PROJECT_ID}
          paths:
              - ${UV_CACHE_DIR}

    artifacts:
        when: always
        paths:
            - reports/**
            - htmlcov/**
        reports:
            junit: reports/junit-report.xml
            coverage_report:
                coverage_format: cobertura
                path: reports/coverage.xml

tag-latest:
    stage: tag-latest

    needs:
        - generate-tag
        - job: test-typecheck
          artifacts: false
        - job: test-pytest
          artifacts: false
        - job: test-controller-regular
          artifacts: false
        - job: test-actuator-regular
          artifacts: false
        - job: test-webui-docker
          artifacts: false
        - job: test-healthz-docker
          artifacts: false
        - job: test-config-compat
          artifacts: false

    script:
        # NOTE: マルチアーキイメージは manifest ごと参照を張る必要がある
        - 'echo "Tagging multi-arch image ${CI_REGISTRY_IMAGE}:${TAG} as latest"'
        - docker buildx imagetools create -t ${CI_REGISTRY_IMAGE}:latest ${CI_REGISTRY_IMAGE}:${TAG}

    rules:
        - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH
          when: never
        - when: on_success

deploy:
    stage: deploy

    needs:
        - generate-tag
        - job: test-typecheck
          artifacts: false
        - job: test-pytest
          artifacts: false
        - job: test-controller-regular
          artifacts: false
        - job: test-actuator-regular
          artifacts: false
        - job: test-webui-docker
          artifacts: false
        - job: test-healthz-docker
          artifacts: false
        - job: test-config-compat
          artifacts: false

    image:
        name: gitlab.green-rabbit.net:5050/kimata/local-kubectl:250715_c88f3965

    before_script: []

    script:
        - 'IMAGE="${CI_REGISTRY_IMAGE}:${TAG}"'
        - 'echo "Deploying image: $IMAGE"'

        - kubectl config get-contexts

        - kubectl config use-context kimata/unit-cooler:pod-rollout
        - kubectl -n hems set image deployment/unit-cooler-controller unit-cooler-controller=${IMAGE}
        - kubectl -n hems set image deployment/unit-cooler-actuator unit-cooler-actuator=${IMAGE}
        - kubectl -n hems set image deployment/unit-cooler-webui unit-cooler-webui=${IMAGE}
        - kubectl -n hems set image deployment/unit-cooler-webui-demo unit-cooler-webui-demo=${IMAGE}
        - kubectl -n hems rollout status deployment/unit-cooler-controller --timeout=300s
        - kubectl -n hems rollout status deployment/unit-cooler-actuator --timeout=300s
        - kubectl -n hems rollout status deployment/unit-cooler-webui --timeout=300s
        - kubectl -n hems rollout status deployment/unit-cooler-webui-demo --timeout=300s

        - 'echo "✓ All deployments updated successfully to $TAG"'

    rules:
        # NOTE: 自動実行ではデプロイしない
        - if: $CI_PIPELINE_SOURCE == "schedule"
          when: never
        - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH
          when: never
        - when: on_success

renovate:
    stage: renovate
    dependencies: []
    resource_group: renovate
    image:
        name: gitlab.green-rabbit.net:5050/kimata/local-renovate:260104_3da7b77b

    before_script: []

    variables:
        RENOVATE_CACHE_DIR: .renovate-cache
        LOG_LEVEL: info

    script:
        - renovate --platform gitlab --token ${RENOVATE_TOKEN} --endpoint ${CI_SERVER_URL}/api/v4 ${CI_PROJECT_PATH}

    cache:
        key: renovate-${CI_PROJECT_ID}
        paths:
            - ${RENOVATE_CACHE_DIR}

    rules:
        - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH
          when: never
        - if: $CI_PIPELINE_SOURCE == "schedule"
        - changes:
              - renovate.json

# プロジェクト固有ジョブ（py-project は触らない）
include:
    - local: .gitlab/ci-local.yml
