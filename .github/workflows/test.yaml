name: Test
"on":
    push:

permissions:
    contents: read
    pages: write
    id-token: write
    checks: write
    pull-requests: write

jobs:
    build:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                node-version: [22.x]

        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: "npm"
                  cache-dependency-path: "frontend/package-lock.json"

            - name: Install Dependencies
              run: npm ci
              working-directory: ./frontend

            - name: Build
              run: npm run build
              working-directory: ./frontend

            - name: Upload built file
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
              with:
                  name: frontend-dist
                  path: frontend/dist

    test:
        needs: build
        runs-on: ubuntu-latest

        env:
            TZ: "Asia/Tokyo"

        strategy:
            matrix:
                python-version: ["3.11", "3.12", "3.13"]

        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Download frontend built files
              uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
              with:
                  name: frontend-dist
                  path: frontend/dist

            - name: Set locale
              run: |
                  sudo locale-gen ja_JP.UTF-8

            - name: Install uv
              uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
              with:
                  enable-cache: true

            - name: Cache python modules
              id: cache-python-modules
              uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
              env:
                  cache-name: cache-python-modules
              with:
                  path: $HOME/.cache
                  key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('uv.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-build-${{ env.cache-name }}-
                      ${{ runner.os }}-build-
                      ${{ runner.os }}-

            - name: Install Dependencies
              run: |
                  uv sync

            - name: Run Tests
              run: uv run pytest tests/unit/ tests/integration/

            - name: Upload coverage to Coveralls
              uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2
              if: matrix.python-version == '3.12'
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  path-to-lcov: reports/coverage.lcov

            - name: Publish Test Results
              uses: dorny/test-reporter@3eeb9fc888e82e8be2fb356bbeec2750231672bc # v1
              if: success() || failure()
              with:
                  name: test results (${{ matrix.python-version }})
                  path: reports/junit-report.xml
                  reporter: java-junit

            - name: Upload coverage file
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
              if: always()
              with:
                  name: pytest-${{ matrix.python-version }}
                  path: reports

            - name: Upload artifact
              uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
              if: matrix.python-version == '3.12'
              with:
                  path: reports

    e2e:
        needs: [build, test]
        runs-on: ubuntu-latest

        env:
            TZ: "Asia/Tokyo"

        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Set up Python 3.12
              uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
              with:
                  python-version: "3.12"

            - name: Download frontend built files
              uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
              with:
                  name: frontend-dist
                  path: frontend/dist

            - name: Set locale
              run: |
                  sudo locale-gen ja_JP.UTF-8

            - name: Install uv
              uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
              with:
                  enable-cache: true

            - name: Install Dependencies
              run: |
                  uv sync

            - name: Install Playwright browsers
              run: uv run playwright install --with-deps chromium

            - name: Start web server for E2E tests
              run: |
                  uv run python src/webui.py -c config.example.yaml &
                  echo $! > webserver.pid
                  # Wait for server to start
                  sleep 10
                  # Check if server is running
                  curl -f http://127.0.0.1:5000/unit-cooler/ || echo "Web server failed to start"
              continue-on-error: true

            - name: Run Playwright E2E tests
              run: uv run pytest tests/e2e/test_webui.py --no-cov --host 127.0.0.1 --port 5000
              continue-on-error: true

            - name: Stop web server
              run: |
                  if [ -f webserver.pid ]; then
                    kill $(cat webserver.pid) || true
                    rm webserver.pid
                  fi
              if: always()

    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        needs: test
        if: github.ref == 'refs/heads/master'
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
